name: Build Windows EXE

on:
  workflow_dispatch:          # manual trigger from Actions tab
  push:
    tags:
      - 'v*'                  # also runs on version tags like v1.0.0

permissions:
  contents: write             # needed to create GitHub Releases

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: cmd
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        shell: cmd
        run: pyinstaller faa_app.spec

      - name: Zip the output folder
        shell: pwsh
        run: |
          Compress-Archive -Path dist\FAA_RockSlope\* `
            -DestinationPath dist\FAA_RockSlope_Windows.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: FAA_RockSlope_Windows
          path: dist\FAA_RockSlope_Windows.zip
          retention-days: 30

      - name: Create GitHub Release and upload ZIP
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/FAA_RockSlope_Windows.zip
          body: |
            ## FAA Rock Slope Analysis — Windows standalone

            **No installation required.** Extract the ZIP and run `FAA_RockSlope.exe`.

            ### What's included
            - Python runtime (embedded)
            - All dependencies: open3d, PyQt5, matplotlib, scipy, laspy/lazrs

            ### Supported input formats
            PLY · OBJ · STL · FBX · OFF · GLTF · LAS · LAZ · XYZ · PCD · PTS
